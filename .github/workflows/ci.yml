name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test-frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web test --coverage

  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r apps/api/requirements.txt
      - run: pip install -r apps/api/requirements-dev.txt
      - name: Run pytest with coverage
        env:
          # Test-safe placeholder values — these are NOT real credentials
          ANTHROPIC_API_KEY: test-placeholder-not-a-real-key
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-placeholder
          SUPABASE_ANON_KEY: test-anon-key-placeholder
          JWT_SECRET: test-secret-at-least-32-characters-long-placeholder
          RESEND_API_KEY: test-resend-key-placeholder
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: sqlite:///./test.db
          ENVIRONMENT: test
        run: |
          cd apps/api
          pytest --cov=app --cov-report=xml --cov-fail-under=70

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build
